version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: notifyqueue-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: notify
      POSTGRES_PASSWORD: notify
      POSTGRES_DB: notifyqueue
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: notifyqueue-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
